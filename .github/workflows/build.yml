name: VEGA Auto Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger from GitHub website

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Expo + EAS CLI
        run: |
          npm install -g expo-cli eas-cli
          echo "EAS CLI installed"

      - name: Install dependencies
        run: npm install

      - name: Setup EAS project
        run: |
          echo "Project: ${{ secrets.EAS_PROJECT_ID }}"

      - name: Build Android APK (Preview)
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Notify build complete
        run: echo "✅ Build submitted to EAS — check expo.dev for APK download link"
