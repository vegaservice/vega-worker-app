name: Build & Submit to Stores

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: store-submission
  cancel-in-progress: true

jobs:
  build-android:
    name: Android - Build and Submit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Create Google Play key file
        run: printf '%s' "$GOOGLE_PLAY_KEY" > google-play-key.json
        env:
          GOOGLE_PLAY_KEY: ${{ secrets.GOOGLE_PLAY_KEY_JSON }}

      - name: Build and Submit Android
        run: eas build --platform android --profile production --non-interactive --auto-submit

  build-ios:
    name: iOS - Build and Submit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build iOS
        run: eas build --platform ios --profile production --non-interactive

      - name: Write ASC API key for submission
        run: printf '%s' "$ASC_KEY" > asc-api-key.p8
        env:
          ASC_KEY: ${{ secrets.ASC_API_KEY_CONTENT }}

      - name: Submit iOS to TestFlight
        run: eas submit --platform ios --profile production --non-interactive --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
