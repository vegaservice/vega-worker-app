name: CI

on:
  push:
    branches: [ main, claude/fix-github-access-awbra ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run linter (if configured)
        run: npm run lint --if-present
        continue-on-error: true
      
      - name: Run tests
        run: npm test --if-present --passWithNoTests
      
      - name: Check for syntax errors
        run: npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output /dev/null 2>&1 | grep -v "^$" | head -20
        continue-on-error: true
